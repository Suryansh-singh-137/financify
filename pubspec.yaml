name: pocket_cfo
description: Your Private Financial Brain - 100% Offline AI-powered personal CFO app built with RunAnywhere SDK.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # RunAnywhere SDK packages (remote from pub.dev)
  runanywhere: 0.16.0
  runanywhere_llamacpp: 0.16.0
  runanywhere_onnx: 0.16.0

  # UI and Icons
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  
  # State management
  provider: ^6.1.2
  
  # Utilities
  intl: ^0.19.0
  http: ^1.2.0
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Charts
  fl_chart: ^0.66.0
  
  # UUID generation
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
